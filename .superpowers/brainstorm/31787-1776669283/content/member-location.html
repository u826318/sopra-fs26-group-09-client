<h2>成员列表放在哪里？</h2>
<p class="subtitle">选择成员列表的显示位置</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>独立页面 /households/[id]/members</h3>
      <p>从 pantry 页面点击按钮跳转到专属成员页面，结构清晰，互不干扰</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Pantry 页面内的 Tab 切换</h3>
      <p>在 /households/[id] 页面顶部加 Tab，"Pantry" 和 "Members" 来回切换</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Pantry 页面内的卡片/区块</h3>
      <p>在 pantry 列表下方直接加一个成员列表区块，同一页面滚动查看</p>
    </div>
  </div>
</div>
